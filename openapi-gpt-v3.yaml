openapi: 3.1.0
info:
  title: Factory Ledger System
  version: 3.3.0
  description: Inventory management, production tracking, and sales order fulfillment for food manufacturing.
servers:
  - url: https://fastapi-production-b73a.up.railway.app
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ReceiveRequest:
      type: object
      required: [product_name, cases, case_size_lb, shipper_name, bol_reference]
      properties:
        mode:
          type: string
          enum: [preview, commit]
          default: preview
        product_name:
          type: string
        cases:
          type: integer
        case_size_lb:
          type: number
        shipper_name:
          type: string
        bol_reference:
          type: string
        shipper_code_override:
          type: string
        lot_code:
          type: string
        supplier_lot_code:
          type: string
          description: "Supplier's printed lot code. Defaults to lot_code if omitted, or 'N/A' if neither is provided."
        lot_type:
          type: string
          enum: [single_supplier, commingled]
        supplier_lot_entries:
          type: array
          items:
            type: object
            properties:
              supplier_lot_code:
                type: string
              supplier_name:
                type: string
              quantity_lb:
                type: number
              notes:
                type: string
    ShipRequest:
      type: object
      required: [product_name, quantity_lb, customer_name, order_reference]
      properties:
        mode:
          type: string
          enum: [preview, commit]
          default: preview
        product_name:
          type: string
        quantity_lb:
          type: number
        customer_name:
          type: string
        order_reference:
          type: string
        lot_code:
          type: string
        force_standalone:
          type: boolean
          default: false
        force_create_customer:
          type: boolean
          default: false
    MakeRequest:
      type: object
      required: [product_name, batches]
      properties:
        mode:
          type: string
          enum: [preview, commit]
          default: preview
        product_name:
          type: string
        batches:
          type: integer
        lot_code:
          type: string
        ingredient_lot_overrides:
          oneOf:
            - type: object
              additionalProperties:
                type: string
            - type: string
        excluded_ingredients:
          type: array
          items:
            type: integer
        confirmed_sku:
          type: boolean
    PackRequest:
      type: object
      required: [source_product, target_product, cases]
      properties:
        mode:
          type: string
          enum: [preview, commit]
          default: preview
        source_product:
          type: string
          description: "Batch product name or odoo_code (e.g., '31011' or 'Graham Cracker Crumbs - 50 LB')"
        target_product:
          type: string
          description: "Finished good name or odoo_code (e.g., '31012' or 'Graham Cracker Crumbs - 10 LB')"
        cases:
          type: integer
        case_weight_lb:
          type: number
          description: "Override case weight in lb; defaults to target product's case_size_lb"
        lot_allocations:
          type: array
          description: "SOURCE lot overrides only (e.g., pull from a specific batch lot). Omit for FIFO. Do NOT put the output/FG lot here - use target_lot_code instead."
          items:
            type: object
            required: [lot_code, quantity_lb]
            properties:
              lot_code:
                type: string
              quantity_lb:
                type: number
        target_lot_code:
          type: string
          description: "Override output lot code; defaults to primary source lot code"
    AdjustRequest:
      type: object
      required: [product_name, lot_code, adjustment_lb, reason]
      properties:
        mode:
          type: string
          enum: [preview, commit]
          default: preview
        product_name:
          type: string
        lot_code:
          type: string
        adjustment_lb:
          type: number
        reason:
          type: string
        reason_es:
          type: string
    CustomerCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string
        notes_es:
          type: string
    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string
        notes_es:
          type: string
        active:
          type: boolean
        aliases:
          type: array
          items:
            type: string
    OrderLineInput:
      type: object
      required: [product_name]
      properties:
        product_name:
          type: string
        quantity:
          type: number
        unit:
          type: string
        case_weight_lb:
          type: number
        quantity_lb:
          type: number
        unit_price:
          type: number
        notes:
          type: string
        notes_es:
          type: string
    OrderCreate:
      type: object
      required: [customer_name, lines]
      properties:
        customer_name:
          type: string
        requested_ship_date:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineInput'
        notes:
          type: string
        notes_es:
          type: string
    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, confirmed, in_production, ready, partial_ship, shipped, invoiced, cancelled]
    OrderHeaderUpdate:
      type: object
      properties:
        requested_ship_date:
          type: string
          format: date
          description: "Ship date in YYYY-MM-DD format. Convert user dates (e.g. '3/31/26' → '2026-03-31'). Empty string to clear."
        notes:
          type: string
          description: "Order notes (English)"
        notes_es:
          type: string
          description: "Order notes (Spanish)"
        customer_id:
          type: integer
          description: "Change the customer for this order"
    AddOrderLines:
      type: object
      required: [lines]
      properties:
        lines:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineInput'
    ShipOrderRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [preview, commit]
          default: preview
        ship_all:
          type: boolean
          default: false
        lines:
          type: array
          items:
            type: object
            required: [line_id, quantity_lb]
            properties:
              line_id:
                type: integer
              quantity_lb:
                type: number
paths:
  /products/search:
    get:
      operationId: searchProducts
      summary: "Search products using 3-tier matching: exact -> keyword (word-order independent) -> trigram similarity. Returns match_tier per result."
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: "Product name, partial name, or odoo_code. Word order does not matter -- 'Chocolate Sprinkles 10' finds 'Sprinkles Chocolate 10 LB'."
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: "Product search results with match_tier (exact, keyword, or trigram). Includes case_size_lb, default_batch_lb."
  /products/resolve:
    post:
      operationId: resolveProducts
      summary: "Bulk-resolve raw product names to database products. Use BEFORE creating sales orders from OCR text to verify matches. Returns confidence per item."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [names]
              properties:
                names:
                  type: array
                  items:
                    type: string
                  description: "Raw product name strings from OCR or order confirmations"
            example:
              names:
                - "Chocolate Sprinkles 10 lb"
                - "Rainbow Sprinkles 10 lb Case"
                - "90002"
      responses:
        '200':
          description: |
            Each item: input, match {id, name, odoo_code} or null, match_tier (exact/keyword/trigram/null), confidence (high/medium/low/none).
            Multiple matches -> top in 'match', rest in 'alternatives'. Summary has total/resolved/unresolved.
  /bom/products:
    get:
      operationId: listProducts
      summary: "List all active products, optionally filtered by type (ingredient, batch, finished_good) and name search."
      parameters:
        - name: product_type
          in: query
          description: "Filter by product type"
          schema:
            type: string
            enum: [ingredient, batch, finished_good]
        - name: q
          in: query
          description: "Partial name or odoo_code match"
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: "Array of {id, name, odoo_code, product_type, uom, default_batch_lb, case_size_lb}"
  /bom/batches/{batch_id}/formula:
    get:
      operationId: getBatchFormula
      summary: Get batch formula with ingredient IDs needed for lot overrides and exclusions
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Batch formula with ingredient product IDs
  /inventory/current:
    get:
      operationId: getCurrentInventory
      summary: Get current inventory with on-hand quantities
      parameters:
        - name: product_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Current inventory
  /inventory/lookup:
    get:
      operationId: inventoryLookup
      summary: "Search inventory by product name (fuzzy). This is the PRIMARY endpoint for all inventory questions."
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Fuzzy product name query (e.g. "rainbow sprinkles")
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: "Returns {query, results[]} where each result has product, sku, lots[], total_on_hand"
  /lots/by-code/{lot_code}:
    get:
      operationId: getLotByCode
      summary: Look up lot by lot code (includes supplier_lot_code and supplier_lot_entries)
      parameters:
        - name: lot_code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lot details with supplier lot info
  /lots/{lot_code}/supplier-lot:
    patch:
      operationId: updateSupplierLot
      summary: Attach or update the supplier lot cross-reference on an existing lot
      description: Use when a packing slip or physical label shows a supplier lot number that differs from or was missing on the system lot.
      parameters:
        - name: lot_code
          in: path
          required: true
          schema:
            type: string
          description: The system lot code (e.g., 26-03-10-FOUN-001)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [supplier_lot_code]
              properties:
                supplier_lot_code:
                  type: string
                  description: The supplier's printed lot number from the box/bag/packing slip
                notes:
                  type: string
                  description: Optional context (e.g., "from packing slip during shipment SO260318001")
      responses:
        '200':
          description: Updated lot with previous and new supplier lot codes
        '404':
          description: Lot not found
  /receive:
    post:
      operationId: receive
      summary: Receive inventory (preview or commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiveRequest'
      responses:
        '200':
          description: Preview result or committed receipt
  /ship:
    post:
      operationId: ship
      summary: Ship inventory standalone (preview or commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipRequest'
      responses:
        '200':
          description: Preview result or committed shipment
  /make:
    post:
      operationId: make
      summary: Record batch production (preview or commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeRequest'
      responses:
        '200':
          description: Preview result or committed production
  /pack:
    post:
      operationId: pack
      summary: Pack batch into finished goods (preview or commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackRequest'
      responses:
        '200':
          description: "Preview: includes allocation plan. When packing base batch into FG with intermediate BOM, includes add_in_ingredients, all_add_ins_sufficient, add_in_note. Commit: includes add_in_ingredients_consumed when add-ins were deducted. May include warning/warning_es if mismatch cannot be resolved via add-ins."
  /adjust:
    post:
      operationId: adjust
      summary: Adjust inventory quantity (preview or commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustRequest'
      responses:
        '200':
          description: Preview result or committed adjustment
  /trace/batch/{lot_code}:
    get:
      operationId: traceBatch
      summary: Trace batch ingredients (backward trace)
      parameters:
        - name: lot_code
          in: path
          required: true
          schema:
            type: string
        - name: product_id
          in: query
          required: false
          schema:
            type: integer
          description: Disambiguate when lot_code matches multiple products. Pass the product_id from the 409 ambiguous_lot_code response.
      responses:
        '200':
          description: "Batch trace with ingredient lots. Includes case_size_lb, output_units, on_hand_units for packaged products."
  /trace/ingredient/{lot_code}:
    get:
      operationId: traceIngredient
      summary: Trace ingredient usage (forward trace)
      parameters:
        - name: lot_code
          in: path
          required: true
          schema:
            type: string
        - name: product_id
          in: query
          required: false
          schema:
            type: integer
          description: Disambiguate when lot_code matches multiple products. Pass the product_id from the 409 ambiguous_lot_code response.
      responses:
        '200':
          description: Ingredient usage trace
  /trace/supplier-lot/{supplier_lot_code}:
    get:
      operationId: traceSupplierLot
      summary: FDA recall trace — find all internal lots and exposure for a supplier lot code
      parameters:
        - name: supplier_lot_code
          in: path
          required: true
          schema:
            type: string
        - name: product_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter to a specific product when supplier lot code matches multiple.
      responses:
        '200':
          description: Supplier lot exposure trace with matched internal lots and total exposure summary
  /transactions/history:
    get:
      operationId: getTransactionHistory
      summary: Get recent transaction history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: transaction_type
          in: query
          schema:
            type: string
            enum: [receive, ship, make, pack, adjust]
        - name: product_name
          in: query
          schema:
            type: string
        - name: since
          in: query
          description: Start date (inclusive), format YYYY-MM-DD
          schema:
            type: string
            format: date
        - name: until
          in: query
          description: End date (inclusive), format YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Transaction history
  /customers:
    get:
      operationId: listCustomers
      summary: List all customers
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Customer list
    post:
      operationId: createCustomer
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreate'
      responses:
        '200':
          description: Created customer
  /customers/{customer_id}:
    patch:
      operationId: updateCustomer
      summary: Update customer details
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdate'
      responses:
        '200':
          description: Updated customer
  /sales/orders:
    get:
      operationId: listOrders
      summary: List sales orders with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: customer
          in: query
          schema:
            type: string
        - name: overdue_only
          in: query
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: "Sales orders. Includes total_units, shipped_units, remaining_units for packaged products."
    post:
      operationId: createOrder
      summary: Create a new sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '200':
          description: Created order
  /sales/orders/fulfillment-check:
    get:
      operationId: checkFulfillment
      summary: Check inventory availability for open orders
      parameters:
        - name: customer_name
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: order_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Fulfillment feasibility
  /sales/orders/{order_id}:
    get:
      operationId: getOrder
      summary: Get sales order details
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: "Order DB id (integer) or order number (e.g. 'SO-260323-001')"
      responses:
        '200':
          description: "Order details with lines. Lines include unit_count, shipped_units, remaining_units. Totals include total_ordered_units, total_shipped_units, total_remaining_units."
    patch:
      operationId: updateOrderHeader
      summary: Update order header (ship date, notes, customer)
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: "Order DB id (integer) or order number (e.g. 'SO-260323-001')"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderHeaderUpdate'
      responses:
        '200':
          description: Updated order
  /sales/orders/{order_id}/status:
    patch:
      operationId: updateOrderStatus
      summary: Update order status
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: "Order DB id (integer) or order number (e.g. 'SO-260323-001')"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdate'
      responses:
        '200':
          description: Updated order status
  /sales/orders/{order_id}/lines:
    post:
      operationId: addOrderLines
      summary: Add lines to an existing order
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: "Order DB id (integer) or order number (e.g. 'SO-260323-001')"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrderLines'
      responses:
        '200':
          description: Added lines
  /sales/orders/{order_id}/lines/{line_id}/cancel:
    patch:
      operationId: cancelOrderLine
      summary: Cancel a specific order line
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: "Order DB id (integer) or order number (e.g. 'SO-260323-001')"
        - name: line_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cancelled line
  /sales/orders/{order_id}/lines/{line_id}/update:
    patch:
      operationId: updateOrderLine
      summary: Update quantity or price on an order line
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: "Order DB id (integer) or order number (e.g. 'SO-260323-001')"
        - name: line_id
          in: path
          required: true
          schema:
            type: integer
        - name: quantity_lb
          in: query
          schema:
            type: number
        - name: unit_price
          in: query
          schema:
            type: number
      responses:
        '200':
          description: "Updated line with case_size_lb and unit_count"
  /sales/orders/{order_id}/ship:
    post:
      operationId: shipOrder
      summary: Ship against a sales order (preview or commit)
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: "Order DB id (integer) or order number (e.g. 'SO-260323-001')"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipOrderRequest'
      responses:
        '200':
          description: "Preview result or committed shipment with shipment_id. Commit includes shipped_units per line."
