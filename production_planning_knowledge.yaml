shift_structure:
  mon_thu: { start: "08:00", end: "17:00", breaks_minutes: 45, working_hours: 8.25 }
  fri: { start: "08:00", end: "14:30", breaks_minutes: 0, working_hours: 6.0 }
  sat_sun: { working_hours: 0 }
  weekly_working_hours: 39.0   # 4 × 8.25 + 6
  seasonal_variation: none
  derived_weekly_capacity:
    granola_batches: ~75        # 4 × 16/day + ~11 on Fri (6/8.25 × 16)
    coconut_batches: ~57        # 4 × 12/day + ~8.7 on Fri
    note: "Fri capacity is ~73% of a full day; derived numbers assume linear scaling. Owner didn't explicitly confirm Fri batch counts — treat as planning estimates."
shared_resources:
  - name: coconut_line
    kind: plant_capacity
    independent_of_granola: true       # owner 2026-04-23: "coconut is run on a different line, completely"
    applies_to: all_coconut_batches
    capacity_batches_per_day: 12       # owner 2026-04-23
    bottleneck_piece: TBD              # kettle/tumbler/dryer — not asked
    labor:
      people: 2.5                      # owner 2026-04-23: "12 batches - 2.5 people"
      note: "0.5 likely means one worker shared/part-time. Distinct from granola-line crew."
    notes: "Coconut is a cook-syrup + coat-coconut + dry/toast process — distinct from the granola oven bake. Runs in parallel with the granola line; does NOT consume granola capacity."

  - name: pack_25_lb
    kind: pack_throughput
    cases_per_hour_per_person: 19        # owner 2026-04-23
    pack_crew: 1
    lb_per_hour: 475                      # 19 × 25
    applies_to: "all 25 LB bulk granola cases (house and private-label, including BS brand)"
    notes: "1 person runs the pack line; typically 1 batch (~13 × 25 LB cases) packs out in ~40 min."

  - name: pack_10_lb
    kind: pack_throughput
    cases_per_hour_per_person: 52        # owner 2026-04-23
    pack_crew: 1
    lb_per_hour: 520                      # 52 × 10
    applies_to: "all 10 LB bulk granola cases"
    notes: "1 person runs the pack line; 1 batch of 90002 (32 × 10 LB cases) packs out in ~37 min."

  - name: pouch_line
    kind: pack_throughput
    bags_per_hour: [750, 1000]            # owner 2026-04-23 — range
    pack_crew: 3
    applies_to: "SS 12x10 OZ cases (70002/70003/70010/70011/70070) and BS 6x7 OZ + 6x8 OZ cases (70073/70074/70079/70080/70088)"
    notes: "3 people. Bags, not cases. SS = 12 bags/case → 62-83 cases/hr. BS = 6 bags/case → 125-167 cases/hr."

  - name: coconut_pack
    kind: pack_throughput
    cases_per_hour_per_person: null       # same-day-as-production, not independently rate-limited
    pack_crew: 2                          # combined make+pack for coconut
    applies_to: "all coconut FGs (10006/10007/67470/10001/10020/67476/893/10002/67473/10010/10029)"
    notes: "Owner 2026-04-23: 'coconut packed same day as production, not rate-limited separately.' The 2 people are the same coconut_line make+pack crew (matches 2.5 people on the line overall)."

  - name: pack_support
    kind: pack_throughput
    applies_to: "cross-cutting support functions — may run concurrently with pack line or pre-staged"
    functions:
      - { name: box_making, people: 1 }
      - { name: labeling_25_lb, people: 1 }
    notes: "Owner 2026-04-23: separate workstations from the pack line itself. A full 25 LB pack run may need up to 3 people total across pack + box-making + labeling if all are running concurrently."

  - name: granola_line
    kind: plant_capacity
    capacity_batches_per_day: 16
    applies_to: all_granola_batches    # confirmed by owner 2026-04-23
    parallelism: none                  # owner 2026-04-23: "everything queues behind the same constraint"
    bottleneck_piece: ["oven", "mixing_pan"]   # owner 2026-04-23: both gate throughput; one-in-flight
    labor:
      people_required_for_16_bpd: 3
      roles:
        - { count: 2, role: mixing_and_treying }
        - { count: 1, role: oven_load_unload }
    notes: "Safe number to assume across any granola SKU. Single-threaded pipeline — no two granola batches run in parallel on different equipment. Bottleneck is the shared oven + single mixing pan (one batch in flight at a time from mix through bake). To hit 16 batches/day need 2 people mixing+treying and 1 running the ovens (load/unload)."
priority_rules:
  policy: manual_judgment
  decision_maker: owner
  note: "When two same-day orders can't both be made, the owner makes the call — no hard-coded tiebreaker (customer size, margin, order size, FIFO, etc.). Planner should surface the conflict for review, not auto-resolve."

customer_lead_time_days:
  promise_from_order: 14        # "~2 weeks from order"
  once_ready_to_ship: 0          # "ships same day"
  note: "Owner promises ~2 weeks lead time from order receipt to shipment. Once a case is packed, it ships same-day. Implies the planner has up to ~14 days of production runway per order by default."

standing_orders:
  formal: []
  informal:
    - customer: "Sunshine"
      demand_pattern: "consistent ongoing"
      sku_list: null              # not captured during interview — follow up separately
      note: "Owner: 'Sunshine = consistent ongoing demand.' Treat as known baseline demand even without an SO; specific SKUs and cadence need separate confirmation."

