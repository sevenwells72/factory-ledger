    kind: specialty_or_low_frequency_ingredients
    examples_given: ["fruit nut inclusions (dried cranberries, raisins, walnuts, sliced almonds)", "vanilla flavor / vanilla-line inclusions"]
    note: "Owner 2026-04-23: 'specialty / infrequently used ingredients are risk items' — low turnover means higher stock-out probability relative to high-turnover oats/sugar/canola oil."

shelf_life_policy:
